name: MediaGrab CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MediaGrab-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Build release APK (unsigned)
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Check for signing secrets
        id: keycheck
        run: echo "available=${{ secrets.KEYSTORE_BASE64 != '' }}" >> "$GITHUB_OUTPUT"

      - name: Sign release APK
        id: sign
        if: steps.keycheck.outputs.available == 'true'
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Upload unsigned release APK
        if: steps.keycheck.outputs.available != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: MediaGrab-release-unsigned
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload signed release APK
        if: steps.sign.outputs.signedReleaseFile != ''
        uses: actions/upload-artifact@v4
        with:
          name: MediaGrab-release-signed
          path: ${{ steps.sign.outputs.signedReleaseFile }}
